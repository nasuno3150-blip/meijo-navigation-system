<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>テスト - 名城大学 屋内ナビゲーション</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
        .test-box { background: white; padding: 20px; margin: 10px 0; border-radius: 5px; }
        .success { color: green; font-weight: bold; }
        .error { color: red; font-weight: bold; }
        canvas { border: 1px solid #ccc; max-width: 100%; }
    </style>
</head>
<body>
    <h1>🔍 デバッグテストページ</h1>
    
    <div class="test-box">
        <h2>1. mapData.js の読み込み確認</h2>
        <p id="test1">読み込み中...</p>
    </div>

    <div class="test-box">
        <h2>2. 地図画像の読み込み確認</h2>
        <p id="test2">読み込み中...</p>
        <canvas id="canvas-test" width="400" height="300"></canvas>
    </div>

    <div class="test-box">
        <h2>3. ノード情報の確認</h2>
        <p id="test3">読み込み中...</p>
    </div>

    <!-- mapData.js を最初に読み込む -->
    <script>
        // インラインで必要な部分を定義
        console.log("=== デバッグテスト開始 ===");
    </script>
    <script src="mapData.js?v=" + new Date().getTime()></script>
    <script>
        // Test 1: FLOOR_IMAGES が定義されているか
        setTimeout(() => {
            const test1 = document.getElementById('test1');
            if (typeof FLOOR_IMAGES !== 'undefined') {
                test1.innerHTML = '<span class="success">✓ FLOOR_IMAGES が定義されています</span>';
                console.log('FLOOR_IMAGES:', FLOOR_IMAGES);
            } else {
                test1.innerHTML = '<span class="error">✗ FLOOR_IMAGES が定義されていません</span>';
            }
        }, 100);

        // Test 2: 画像が読み込めるか
        setTimeout(() => {
            const test2 = document.getElementById('test2');
            const canvas = document.getElementById('canvas-test');
            const ctx = canvas.getContext('2d');
            
            const img = new Image();
            img.onload = () => {
                test2.innerHTML = '<span class="success">✓ floor1.png が正常に読み込めました</span>';
                ctx.drawImage(img, 0, 0, 400, 300);
                console.log('Image loaded successfully');
            };
            img.onerror = () => {
                test2.innerHTML = '<span class="error">✗ floor1.png が読み込めません。ファイルが存在するか確認してください</span>';
                console.error('Image load failed');
            };
            img.src = 'images/floor1.png?' + new Date().getTime();
        }, 100);

        // Test 3: NODES とグラフが定義されているか
        setTimeout(() => {
            const test3 = document.getElementById('test3');
            if (typeof NODES !== 'undefined' && typeof graph !== 'undefined') {
                test3.innerHTML = `<span class="success">✓ NODES と graph が定義されています<br>
                    ノード数: ${Object.keys(NODES).length}<br>
                    エッジ数: ${EDGES.length}
                </span>`;
                console.log('NODES count:', Object.keys(NODES).length);
                console.log('EDGES count:', EDGES.length);
            } else {
                test3.innerHTML = '<span class="error">✗ NODES または graph が定義されていません</span>';
            }
        }, 100);
    </script>
</body>
</html>
